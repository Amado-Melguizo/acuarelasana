<div class="gallery-card">

  <img
    [src]="image.src"
    [alt]="image.alt"
    class="gallery-image">

  <div class="gallery-overlay">

    <div class="gallery-info">
      <h4>{{ image.title }}</h4>

      @if (price) {
        <span>{{ price }}</span>
      }
    </div>

    <div class="gallery-actions">
      <button>
        <i class="bi bi-search"></i>
      </button>

      <button>
        <i class="bi bi-link-45deg"></i>
      </button>
    </div>

  </div>

</div>
